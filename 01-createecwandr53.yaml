- name: creating EC2 and Route53 record
  hosts: local
  connection: local
  vars: 
    ami_id: ami-0220d79f3f480ecf5
    sg_id: sg-0c13a378f7afe6627
    zone_id: Z0986635317WY27GWNQ5N
    domain_name: devopsbhaskar.fun
    # we can pass instances through command line using -e
    # instances:
    # - mongodb
    # - redis
    # - mysql

  tasks: 
  - name: creating ec2 instances
    amazon.aws.ec2_instance:
      name: "{{ item }}"
      instance_type: t3.micro
      security_group: "{{ sg_id }}"
      image_id: "{{ ami_id }}"
      tags:
        Name: "{{ item }}"
    loop: "{{ instances }}"
    register: ec2_output

  - name: print the ec2_output
    ansible.builtin.debug:
      msg: "{{ ec2_output }}"

  - name: create route53 record
    amazon.aws.route53:
      state: present
      zone: "{{ domain_name }}"
      record: "{{ item.item }}.{{ domain_name }}" # mongodb.daws86s.fun
      type: A
      ttl: 1
      value: "{{ item.instances[0].private_ip_address }}"
      overwrite: true
    loop: "{{ ec2_output.results }}"
  
